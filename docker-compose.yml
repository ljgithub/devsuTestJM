version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: banco-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=banco_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - TZ=America/Guayaquil
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./BaseDatos.sql:/docker-entrypoint-initdb.d/BaseDatos.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d banco_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: banco-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=banco_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - TZ=America/Guayaquil
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: banco-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
